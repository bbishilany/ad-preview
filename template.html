<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ad Preview — Mileage Design</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #22263a;
    --border: #2e3350;
    --accent: #4f7aff;
    --accent2: #7c3aed;
    --green: #22c55e;
    --orange: #f59e0b;
    --text: #e8eaf6;
    --text2: #8b92b8;
    --danger: #ef4444;
    --gold: #c9a84c;
  }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    padding-bottom: 48px; /* space for collapsed drawer */
  }

  /* HEADER */
  .header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
    justify-content: space-between;
  }
  .header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .header-logo svg { width: 28px; height: 28px; }
  .header-logo span {
    font-size: 16px;
    font-weight: 700;
    background: linear-gradient(135deg, #4f7aff, #7c3aed);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -0.3px;
  }
  .header-badge {
    font-size: 10px;
    background: var(--accent2);
    color: white;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* Reviewer Mode Toggle */
  .reviewer-toggle {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 11px;
    color: var(--text2);
  }
  .reviewer-toggle-label {
    margin-right: 6px;
    white-space: nowrap;
  }
  .reviewer-pill {
    padding: 4px 12px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .reviewer-pill:hover { border-color: var(--accent); color: var(--text); }
  .reviewer-pill.active {
    background: rgba(79,122,255,0.15);
    color: var(--accent);
    border-color: var(--accent);
  }

  /* Keyboard shortcut help */
  .kb-help {
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px;
    height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text2);
    font-size: 12px;
    font-weight: 700;
    cursor: help;
    flex-shrink: 0;
  }
  .kb-help:hover .kb-tooltip { display: block; }
  .kb-tooltip {
    display: none;
    position: absolute;
    top: 100%;
    right: 0;
    margin-top: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 16px;
    font-size: 11px;
    font-weight: 400;
    color: var(--text2);
    white-space: nowrap;
    z-index: 200;
    line-height: 2;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .kb-tooltip kbd {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 4px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-size: 10px;
    font-family: monospace;
    margin-right: 4px;
  }

  /* CAMPAIGN BANNER */
  .campaign-banner {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 20px 24px;
  }
  .campaign-title {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
  }
  .campaign-meta {
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }
  .campaign-meta strong { color: var(--text); font-weight: 600; }

  /* PROGRESS BAR */
  .campaign-progress {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
  }
  .progress-text {
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .progress-text strong { color: var(--text); font-weight: 600; }
  .progress-bar {
    display: flex;
    height: 4px;
    border-radius: 2px;
    overflow: hidden;
    gap: 2px;
    background: var(--surface2);
  }
  .progress-segment {
    flex: 1;
    border-radius: 2px;
    transition: background-color 0.3s;
  }
  .progress-segment.approved { background: var(--green); }
  .progress-segment.changes { background: var(--orange); }
  .progress-segment.commented { background: var(--accent); }
  .progress-segment.unreviewed { background: var(--surface2); }

  /* MAIN CONTAINER */
  .container {
    max-width: 1200px;
    width: 100%;
    margin: 0 auto;
    padding: 24px;
    flex: 1;
  }

  /* AD TABS */
  .adprev-tabs {
    display: flex;
    gap: 6px;
    margin-bottom: 24px;
    overflow-x: auto;
    padding-bottom: 4px;
    flex-wrap: wrap;
  }
  .adprev-tab {
    padding: 8px 16px;
    border-radius: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    transition: all 0.15s;
    text-align: center;
    white-space: nowrap;
    user-select: none;
    position: relative;
  }
  .adprev-tab:hover { border-color: var(--accent); color: var(--text); }
  .adprev-tab.active { background: rgba(79,122,255,0.15); color: var(--accent); border-color: var(--accent); }
  .adprev-tab .tab-week {
    font-size: 9px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    display: block;
    margin-top: 2px;
  }
  .adprev-tab.active .tab-week { color: var(--accent); opacity: 0.7; }

  /* Tab status dot */
  .tab-status-dot {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: none;
  }
  .tab-status-dot.approved { background: var(--green); display: block; }
  .tab-status-dot.changes { background: var(--orange); display: block; }
  .tab-status-dot.commented { background: var(--accent); display: block; }

  /* Two-column layout */
  .adprev-detail {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 28px;
    align-items: start;
  }
  @media (max-width: 900px) {
    .adprev-detail {
      grid-template-columns: 1fr;
    }
  }
  .adprev-mockups {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .adprev-copy-panel { min-width: 0; }
  .adprev-meta-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .adprev-chip {
    font-size: 11px;
    font-weight: 600;
    padding: 4px 10px;
    border-radius: 20px;
    background: var(--surface2);
    color: var(--text2);
    border: 1px solid var(--border);
  }
  .adprev-chip-accent {
    background: rgba(79,122,255,0.12);
    color: var(--accent);
    border-color: rgba(79,122,255,0.3);
  }
  .adprev-section { margin-bottom: 18px; }
  .adprev-section-label {
    font-size: 10px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text2);
    margin-bottom: 6px;
  }
  .adprev-section-body {
    font-size: 13px;
    line-height: 1.6;
    color: var(--text);
    white-space: pre-wrap;
  }
  .adprev-alt-list { list-style: none; padding: 0; }
  .adprev-alt-list li { font-size: 13px; color: var(--text); padding: 3px 0; }
  .adprev-alt-list li::before {
    content: '';
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--accent);
    border-radius: 50%;
    margin-right: 8px;
    vertical-align: middle;
  }

  /* Inline creative direction (details element) */
  .inline-creative-direction {
    margin-top: 14px;
    background: rgba(201,168,76,0.08);
    border: 1px solid rgba(201,168,76,0.25);
    border-left: 4px solid var(--gold);
    border-radius: 10px;
    overflow: hidden;
  }
  .inline-creative-direction summary {
    padding: 12px 16px;
    font-size: 13px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--gold);
    cursor: pointer;
    list-style: none;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
  }
  .inline-creative-direction summary::-webkit-details-marker { display: none; }
  .inline-creative-direction summary::before {
    content: '';
    display: inline-block;
    width: 0; height: 0;
    border-style: solid;
    border-width: 5px 0 5px 8px;
    border-color: transparent transparent transparent var(--gold);
    transition: transform 0.15s;
    flex-shrink: 0;
  }
  .inline-creative-direction[open] summary::before {
    transform: rotate(90deg);
  }
  .inline-creative-direction .direction-body {
    padding: 0 16px 14px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    font-family: monospace, monospace;
  }

  /* Feed mockup */
  .fb-feed {
    width: 380px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    font-size: 13px;
    flex-shrink: 0;
  }
  @media (max-width: 600px) { .fb-feed { width: 100%; } }
  .fb-feed-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 14px;
  }
  .fb-avatar {
    width: 36px; height: 36px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px; font-weight: 700; flex-shrink: 0;
  }
  .fb-page-name { font-weight: 600; font-size: 13px; color: var(--text); }
  .fb-sponsored { font-size: 11px; color: var(--text2); }
  .fb-feed-text {
    padding: 0 14px 10px;
    font-size: 13px; line-height: 1.5; color: var(--text);
  }
  .fb-feed-img { width: 100%; display: block; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }
  .fb-media-wrap {
    position: relative;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
  }
  .fb-media-wrap img { display: block; width: 100%; }
  .fb-play-btn {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 64px; height: 64px;
    background: rgba(0,0,0,0.55); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .fb-play-btn::after {
    content: ''; display: block;
    width: 0; height: 0;
    border-style: solid;
    border-width: 12px 0 12px 22px;
    border-color: transparent transparent transparent white;
    margin-left: 4px;
  }
  .fb-image-placeholder {
    width: 100%; aspect-ratio: 1/1;
    background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 12px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.5px;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
    position: relative;
  }
  .fb-feed-cta {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid var(--border);
  }
  .fb-feed-cta-text { flex: 1; min-width: 0; }
  .fb-feed-cta-headline {
    font-size: 13px; font-weight: 600; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .fb-feed-cta-desc { font-size: 11px; color: var(--text2); }
  .fb-cta-btn {
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); padding: 6px 14px; border-radius: 6px;
    font-size: 12px; font-weight: 600; white-space: nowrap;
    flex-shrink: 0; margin-left: 12px;
  }
  .fb-reactions {
    display: flex; align-items: center; gap: 20px;
    padding: 10px 14px; color: var(--text2); font-size: 12px; font-weight: 600;
  }

  /* Carousel */
  .fb-carousel-track {
    display: flex; overflow-x: auto; scroll-snap-type: x mandatory;
    border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  }
  .fb-carousel-card {
    min-width: 260px; max-width: 260px; scroll-snap-align: start;
    border-right: 1px solid var(--border); flex-shrink: 0;
  }
  .fb-carousel-card-img {
    width: 100%; aspect-ratio: 1/1; background: var(--surface2);
    display: block; object-fit: cover;
  }
  .fb-carousel-card-placeholder {
    width: 100%; aspect-ratio: 1/1; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    color: var(--text2); font-size: 11px; font-weight: 600;
  }
  .fb-carousel-card-caption {
    padding: 10px 12px; font-size: 12px; line-height: 1.4; color: var(--text);
  }

  /* Stories mockup */
  .ig-story {
    width: 220px; aspect-ratio: 9/16;
    border-radius: 14px; overflow: hidden;
    position: relative; display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    padding: 20px 16px; text-align: center;
    border: 1px solid var(--border);
    background: linear-gradient(180deg, #1a1a2e, #16213e);
  }
  .ig-story-has-img { justify-content: flex-end; padding-bottom: 60px; }
  .ig-story-bg {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover; opacity: 0.45;
  }
  .ig-story-progress {
    position: absolute; top: 8px; left: 8px; right: 8px;
    height: 2px; background: rgba(255,255,255,0.3); border-radius: 2px; z-index: 2;
  }
  .ig-story-progress-fill { width: 40%; height: 100%; background: white; border-radius: 2px; }
  .ig-story-text {
    color: white; font-size: 15px; font-weight: 700; line-height: 1.4;
    margin-bottom: 8px; text-shadow: 0 1px 6px rgba(0,0,0,0.7);
    position: relative; z-index: 2;
  }
  .ig-story-secondary {
    color: rgba(255,255,255,0.8); font-size: 11px; line-height: 1.3;
    margin-bottom: 16px; text-shadow: 0 1px 4px rgba(0,0,0,0.5);
    position: relative; z-index: 2;
  }
  .ig-story-cta {
    background: white; color: #1a1a2e;
    padding: 8px 20px; border-radius: 20px;
    font-size: 12px; font-weight: 700;
    position: absolute; bottom: 24px; z-index: 2;
  }

  /* Reels mockup */
  .ig-reel {
    width: 220px; aspect-ratio: 9/16;
    border-radius: 14px; overflow: hidden;
    position: relative; display: flex; flex-direction: column;
    justify-content: flex-end; padding: 16px;
    border: 1px solid var(--border);
    background: linear-gradient(180deg, #0a0a0a, #1a1a1a);
  }
  .ig-reel-video-label {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    color: rgba(255,255,255,0.3); font-size: 11px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 1px;
  }
  .ig-reel-caption { color: white; font-size: 11px; line-height: 1.4; margin-bottom: 8px; position: relative; z-index: 2; }
  .ig-reel-handle { color: rgba(255,255,255,0.6); font-size: 10px; margin-bottom: 12px; position: relative; z-index: 2; }
  .ig-reel-cta {
    background: white; color: #0a0a0a;
    padding: 8px 20px; border-radius: 20px;
    font-size: 12px; font-weight: 700; text-align: center;
    width: 100%; position: relative; z-index: 2;
  }

  /* STICKY FEEDBACK DRAWER */
  .feedback-drawer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: var(--surface);
    border-top: 1px solid var(--border);
    transition: max-height 0.3s ease;
    max-height: 42px;
    overflow: hidden;
    box-shadow: 0 -4px 24px rgba(0,0,0,0.4);
  }
  .feedback-drawer.expanded {
    max-height: 500px;
    overflow-y: auto;
  }
  .drawer-collapsed-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 24px;
    cursor: pointer;
    min-height: 42px;
    user-select: none;
  }
  .drawer-collapsed-bar:hover { background: var(--surface2); }
  .drawer-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--accent);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .drawer-expand-btn {
    font-size: 11px;
    font-weight: 600;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 6px;
    flex-shrink: 0;
  }
  .drawer-expand-btn svg {
    width: 14px;
    height: 14px;
    transition: transform 0.3s;
  }
  .feedback-drawer.expanded .drawer-expand-btn svg {
    transform: rotate(180deg);
  }
  .drawer-body {
    padding: 0 24px 20px;
    max-width: 800px;
  }

  /* Feedback form inside drawer */
  .feedback-title {
    font-size: 14px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
    color: var(--accent);
  }
  .feedback-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 16px;
  }
  @media (max-width: 600px) { .feedback-row { grid-template-columns: 1fr; } }
  .feedback-label {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    margin-bottom: 4px;
  }
  .feedback-input, .feedback-select, .feedback-textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--text);
    font-family: inherit;
    outline: none;
    transition: border-color 0.15s;
  }
  .feedback-input:focus, .feedback-select:focus, .feedback-textarea:focus {
    border-color: var(--accent);
  }
  .feedback-select { cursor: pointer; }
  .feedback-textarea { min-height: 100px; resize: vertical; }
  .feedback-verdicts {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
  }
  .verdict-option {
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    transition: color 0.15s;
  }
  .verdict-option:hover { color: var(--text); }
  .verdict-option input[type="radio"] {
    accent-color: var(--accent);
    width: 16px;
    height: 16px;
  }
  .feedback-submit {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .feedback-submit:hover { opacity: 0.9; }
  .feedback-submit:disabled { opacity: 0.5; cursor: not-allowed; }
  .feedback-success {
    display: none;
    padding: 16px;
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.3);
    border-radius: 8px;
    color: var(--green);
    font-size: 13px;
    line-height: 1.5;
  }
  .feedback-success.visible { display: block; }
  .feedback-already {
    display: none;
    padding: 16px;
    background: rgba(79,122,255,0.1);
    border: 1px solid rgba(79,122,255,0.3);
    border-radius: 8px;
    color: var(--accent);
    font-size: 13px;
    line-height: 1.5;
    margin-bottom: 12px;
  }
  .feedback-already.visible { display: block; }
  .feedback-already-btn {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 6px 14px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 8px;
    transition: all 0.15s;
  }
  .feedback-already-btn:hover { background: rgba(79,122,255,0.1); }

  /* Draft saved indicator */
  .draft-saved-indicator {
    font-size: 11px;
    color: var(--green);
    opacity: 0;
    transition: opacity 0.3s;
    margin-left: 8px;
  }
  .draft-saved-indicator.visible { opacity: 1; }

  /* Feedback thread */
  .feedback-thread {
    margin-bottom: 16px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 12px;
  }
  .feedback-thread-title {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text2);
    margin-bottom: 10px;
  }
  .feedback-entry {
    display: flex;
    flex-direction: column;
    gap: 4px;
    padding: 10px 12px;
    background: var(--surface2);
    border-radius: 8px;
    margin-bottom: 6px;
    font-size: 12px;
  }

<script>
// ── Configuration ──────────────────────────────────────────────────────────
// These are safe to expose — Supabase anon keys only grant RLS-allowed access.
// Replace these with your actual Supabase project values after setup.
const SUPABASE_URL = 'https://byuxmsohwsvnqfirgeit.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJ5dXhtc29od3N2bnFmaXJnZWl0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MDE3NzYsImV4cCI6MjA4OTk3Nzc3Nn0.YctPyGRzwgdz9-HaHDnWO0KhrVhElRhYKg7feIWPd1c';

let sb = null;
try {

  }
} catch (e) {
  console.warn('Supabase not configured yet:', e.message);
}

// ── State ──────────────────────────────────────────────────────────────────
let _data = null;
let _currentAd = 0;
let _drawerExpanded = false;
let _reviewerMode = localStorage.getItem('adpreview_reviewer_mode') || 'client';
let _draftSaveTimer = null;
const CAMPAIGN_ID = '__CAMPAIGN_ID__';

// ── Load ad data ───────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('data.json');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    _data = await res.json();
    applyReviewerMode(_reviewerMode);
    renderBanner(_data);
    renderProgressBar();
    renderTabs(_data);
    renderAd(0);
    renderDrawer();
  } catch (e) {
    document.getElementById('adprev-container').innerHTML =
      `<p style="color:var(--danger)">Could not load ad data for "${esc(CAMPAIGN_ID)}". Run <code>python build.py ${esc(CAMPAIGN_ID)}</code> first.</p>`;
  }
}

// ── Campaign banner ────────────────────────────────────────────────────────
function renderBanner(data) {
  const el = document.getElementById('campaign-banner');
  el.innerHTML = `
    <div class="campaign-title">${esc(data.campaign || CAMPAIGN_ID)}</div>
    <div class="campaign-meta">
      ${data.event_date ? `<strong>Date:</strong> ${esc(data.event_date)}<br>` : ''}
      ${data.venue ? `<strong>Venue:</strong> ${esc(data.venue)}<br>` : ''}
      ${data.co_presenters ? `<strong>Presenters:</strong> ${esc(data.co_presenters)}` : ''}
    </div>`;
}

// ── Progress Bar ───────────────────────────────────────────────────────────
function renderProgressBar() {
  if (!_data || !_data.ads) return;
  const total = _data.ads.length;
  let reviewed = 0;
  let approvedCount = 0;
  let changesCount = 0;
  let commentedCount = 0;

  const statuses = _data.ads.map((ad, i) => {
    const verdict = localStorage.getItem(`adpreview_verdict_${CAMPAIGN_ID}_${ad.num}`);
    if (verdict) reviewed++;
    if (verdict === 'approve') approvedCount++;
    else if (verdict === 'request_changes') changesCount++;
    else if (verdict === 'comment_only') commentedCount++;
    return verdict;
  });

  const el = document.getElementById('campaign-progress');
  el.innerHTML = `
    <div class="progress-text"><strong>${reviewed} of ${total}</strong> ads reviewed</div>
    <div class="progress-bar">
      ${statuses.map(s => {
        let cls = 'unreviewed';
        if (s === 'approve') cls = 'approved';
        else if (s === 'request_changes') cls = 'changes';
        else if (s === 'comment_only') cls = 'commented';
        return `<div class="progress-segment ${cls}"></div>`;
      }).join('')}
    </div>`;
}

// ── Tabs ───────────────────────────────────────────────────────────────────
function renderTabs(data) {
  const tabsEl = document.getElementById('adprev-tabs');
  if (!data.ads || !data.ads.length) return;
  const weekNames = {1:'Trust', 2:'Emotion', 3:'Authority', 4:'Urgency'};
  tabsEl.innerHTML = data.ads.map((ad, i) => {
    const wk = weekNames[ad.week] || 'Wk' + ad.week;
    const verdict = localStorage.getItem(`adpreview_verdict_${CAMPAIGN_ID}_${ad.num}`);
    let dotClass = '';
    if (verdict === 'approve') dotClass = 'approved';
    else if (verdict === 'request_changes') dotClass = 'changes';
    else if (verdict === 'comment_only') dotClass = 'commented';
    return `<div class="adprev-tab${i===0?' active':''}" onclick="selectTab(${i})" id="tab-${i}">
      <span class="tab-status-dot ${dotClass}"></span>
      Ad ${ad.num}
      <span class="tab-week">Wk ${ad.week} &middot; ${wk}</span>
    </div>`;
  }).join('');
}

function updateTabDot(adNum, verdict) {
  if (!_data || !_data.ads) return;
  const idx = _data.ads.findIndex(a => a.num === adNum);
  if (idx < 0) return;
  const tab = document.getElementById(`tab-${idx}`);
  if (!tab) return;
  const dot = tab.querySelector('.tab-status-dot');
  if (!dot) return;
  dot.className = 'tab-status-dot';
  if (verdict === 'approve') dot.classList.add('approved');
  else if (verdict === 'request_changes') dot.classList.add('changes');
  else if (verdict === 'comment_only') dot.classList.add('commented');
}

function selectTab(idx) {
  _currentAd = idx;
  document.querySelectorAll('.adprev-tab').forEach((t, i) => {
    t.classList.toggle('active', i === idx);
  });
  renderAd(idx);
  renderDrawer();
}

// ── Reviewer Mode ──────────────────────────────────────────────────────────
function setReviewerMode(mode) {
  _reviewerMode = mode;
  localStorage.setItem('adpreview_reviewer_mode', mode);
  applyReviewerMode(mode);
  renderDrawer();
}

function applyReviewerMode(mode) {
  document.getElementById('mode-mileage').classList.toggle('active', mode === 'mileage');
  document.getElementById('mode-client').classList.toggle('active', mode === 'client');
  document.body.classList.toggle('client-mode', mode === 'client');
}

// ── Render ad detail ───────────────────────────────────────────────────────
function renderAd(idx) {
  const container = document.getElementById('adprev-container');
  const ad = _data.ads[idx];
  if (!ad) { container.innerHTML = ''; return; }

  const pageName = _pageName(_data);
  let html = '';

  // Title bar
  html += `<div style="margin-bottom:20px">
    <div style="font-size:18px;font-weight:700;margin-bottom:4px">${esc(ad.title)}</div>
    <div class="adprev-meta-bar">
      <span class="adprev-chip">${esc(ad.type.charAt(0).toUpperCase() + ad.type.slice(1))}</span>
      ${(ad.placements || []).map(p => `<span class="adprev-chip adprev-chip-accent">${esc(p)}</span>`).join('')}
      <span class="adprev-chip">Week ${ad.week}</span>
      ${ad.format ? `<span class="adprev-chip">${esc(ad.format)}</span>` : ''}
    </div>
  </div>`;

  // Two-column: mockups left, copy right
  html += `<div class="adprev-detail">`;

  // Left: mockups
  html += `<div class="adprev-mockups">`;
  if ((ad.placements || []).some(p => p.toLowerCase() === 'feed')) {
    html += ad.type === 'carousel' ? renderCarouselMockup(ad) : renderFeedMockup(ad);
  }
  if ((ad.placements || []).some(p => p.toLowerCase() === 'stories')) {
    html += renderStoryMockup(ad);
  }
  if ((ad.placements || []).some(p => p.toLowerCase() === 'reels')) {
    html += renderReelMockup(ad);
  }
  html += `</div>`;

  // Right: copy details
  html += `<div class="adprev-copy-panel">`;

  if (ad.primary_text) {
    html += `<div class="adprev-section">
      <div class="adprev-section-label">Primary Text</div>
      <div class="adprev-section-body">${esc(ad.primary_text)}</div>
    </div>`;
  }
  if (ad.hook) {
    html += `<div class="adprev-section">
      <div class="adprev-section-label">Hook Line</div>
      <div class="adprev-section-body" style="font-style:italic">${esc(ad.hook)}</div>
    </div>`;
  }
  html += `<div class="adprev-section">
    <div class="adprev-section-label">Headline / Description / CTA</div>
    <div class="adprev-section-body">
      <strong>${esc(ad.headline)}</strong><br>
      ${esc(ad.description)}<br>
      CTA: <strong>${esc(ad.cta)}</strong>
    </div>
  </div>`;

  if (ad.alt_headlines && ad.alt_headlines.length) {
    html += `<div class="adprev-section">
      <div class="adprev-section-label">Alt Headlines</div>
      <ul class="adprev-alt-list">
        ${ad.alt_headlines.map(h => `<li>${esc(h)}</li>`).join('')}
      </ul>
    </div>`;
  }
  if (ad.cards && ad.cards.length) {
    html += `<div class="adprev-section"><div class="adprev-section-label">Card Captions</div>`;
    ad.cards.forEach(card => {
      html += `<div style="margin-bottom:8px">
        <div style="font-size:11px;font-weight:600;color:var(--text2)">Card ${card.num}: ${esc(card.label)}</div>
        <div class="adprev-section-body" style="font-size:12px">${esc(card.caption)}</div>
      </div>`;
    });
    html += `</div>`;
  }
  if (ad.stories) {
    html += `<div class="adprev-section"><div class="adprev-section-label">Stories Copy</div>
      <div class="adprev-section-body" style="font-size:12px">`;
    for (const [k, v] of Object.entries(ad.stories)) {
      html += `<strong>${k.replace(/_/g, ' ')}:</strong> ${esc(v)}<br>`;
    }
    html += `</div></div>`;
  }
  if (ad.reels) {
    html += `<div class="adprev-section"><div class="adprev-section-label">Reels Copy</div>
      <div class="adprev-section-body" style="font-size:12px">`;
    for (const [k, v] of Object.entries(ad.reels)) {
      html += `<strong>${k.replace(/_/g, ' ')}:</strong> ${esc(v)}<br>`;
    }
    html += `</div></div>`;
  }

  // Enhancement 7: Inline creative direction inside copy panel
  if (ad.image_direction) {
    const openAttr = _reviewerMode === 'mileage' ? ' open' : '';
    html += `<details class="inline-creative-direction" data-internal-only${openAttr}>
      <summary>Image Creative Direction</summary>
      <div class="direction-body">${esc(ad.image_direction)}</div>
    </details>`;
  }

  // Internal-only sections with data-internal-only attribute
  if (ad.video_script) {
    html += `<div class="adprev-section" data-internal-only>
      <div class="adprev-section-label">Video Script Notes</div>
      <div class="adprev-section-body" style="font-size:12px">${esc(ad.video_script)}</div>
    </div>`;
  }
  if (ad.video_talking_points) {
    html += `<div class="adprev-section" data-internal-only>
      <div class="adprev-section-label">Video Talking Points</div>
      <div class="adprev-section-body" style="font-size:12px">${esc(ad.video_talking_points)}</div>
    </div>`;
  }
  if (ad.infographic_direction) {
    html += `<div class="adprev-section" data-internal-only>
      <div class="adprev-section-label">Infographic Direction</div>
      <div class="adprev-section-body" style="font-size:12px">${esc(ad.infographic_direction)}</div>
    </div>`;
  }

  html += `</div>`; // close copy-panel
  html += `</div>`; // close detail grid

  container.innerHTML = html;
}

// ── Mockup renderers ───────────────────────────────────────────────────────
function _clientInitials() {
  const name = _data.client || '';
  return name.split('-').map(w => (w[0] || '')).join('').toUpperCase().slice(0, 2);
}
function _pageName(d) {
  const slug = d.client || '';
  return slug.split('-').map(w => w.charAt(0).toUpperCase() + w.slice(1)).join(' ');
}
function _imgUrl(filename) {
  return `images/${filename}`;
}
function _findFeedImage(ad) {
  if (!ad.images || !ad.images.length) return null;
  const img = ad.images.find(f => !f.includes('story'));
  return img ? _imgUrl(img) : null;
}
function _findStoryImage(ad) {
  if (!ad.images || !ad.images.length) return null;
  const storyImg = ad.images.find(f => f.includes('story'));
  return storyImg ? _imgUrl(storyImg) : _findFeedImage(ad);
}
function _findCarouselCardImage(ad, cardNum) {
  if (!ad.images || !ad.images.length) return null;
  const img = ad.images.find(f => f.includes(`card${cardNum}`));
  return img ? _imgUrl(img) : null;
}

function renderFeedMockup(ad) {
  const initials = _clientInitials();
  const pageName = _pageName(_data);
  const imgUrl = _findFeedImage(ad);
  const isVideo = ad.type === 'video';
  const playOverlay = isVideo ? '<div class="fb-play-btn"></div>' : '';

  let mediaHtml;
  if (imgUrl) {
    mediaHtml = `<div class="fb-media-wrap"><img src="${imgUrl}" alt="Ad ${ad.num} creative" loading="lazy">${playOverlay}</div>`;
  } else if (isVideo) {
    mediaHtml = `<div class="fb-image-placeholder">VIDEO &middot; ${esc(ad.format || '1080x1080')}${playOverlay}</div>`;
  } else {
    mediaHtml = `<div class="fb-image-placeholder">IMAGE &middot; ${esc(ad.format || '1080x1080')}</div>`;
  }

  return `<div class="fb-feed">
    <div class="fb-feed-header">
      <div class="fb-avatar">${initials}</div>
      <div style="line-height:1.3">
        <div class="fb-page-name">${esc(pageName)}</div>
        <div class="fb-sponsored">Sponsored</div>
      </div>
    </div>
    <div class="fb-feed-text" style="white-space:pre-wrap">${esc(ad.primary_text)}</div>
    ${mediaHtml}
    <div class="fb-feed-cta">
      <div class="fb-feed-cta-text">
        <div class="fb-feed-cta-headline">${esc(ad.headline)}</div>
        <div class="fb-feed-cta-desc">${esc(ad.description)}</div>
      </div>
      <div class="fb-cta-btn">${esc(ad.cta)}</div>
    </div>
    <div class="fb-reactions"><span>Like</span><span>Comment</span><span>Share</span></div>
  </div>`;
}

function renderCarouselMockup(ad) {
  const initials = _clientInitials();
  const pageName = _pageName(_data);
  let cardsHtml = '';
  if (ad.cards && ad.cards.length) {
    ad.cards.forEach(card => {
      const cardImgUrl = _findCarouselCardImage(ad, card.num);
      const cardImgHtml = cardImgUrl
        ? `<img class="fb-carousel-card-img" src="${cardImgUrl}" alt="Card ${card.num}" loading="lazy">`
        : `<div class="fb-carousel-card-placeholder">Card ${card.num}: ${esc(card.label)}</div>`;
      cardsHtml += `<div class="fb-carousel-card">${cardImgHtml}
        <div class="fb-carousel-card-caption">${esc(card.caption)}</div></div>`;
    });
  }
  return `<div class="fb-feed">
    <div class="fb-feed-header">
      <div class="fb-avatar">${initials}</div>
      <div style="line-height:1.3">
        <div class="fb-page-name">${esc(pageName)}</div>
        <div class="fb-sponsored">Sponsored</div>
      </div>
    </div>
    <div class="fb-feed-text" style="white-space:pre-wrap">${esc(ad.primary_text)}</div>
    <div class="fb-carousel-track">${cardsHtml}</div>
    <div class="fb-feed-cta">
      <div class="fb-feed-cta-text">
        <div class="fb-feed-cta-headline">${esc(ad.headline)}</div>
        <div class="fb-feed-cta-desc">${esc(ad.description)}</div>
      </div>
      <div class="fb-cta-btn">${esc(ad.cta)}</div>
    </div>
    <div class="fb-reactions"><span>Like</span><span>Comment</span><span>Share</span></div>
  </div>`;
}

function renderStoryMockup(ad) {
  const s = ad.stories || {};
  const overlay = s.text_overlay || ad.hook || '';
  const secondary = s.secondary_text || '';
  const cta = s.cta_sticker || ad.cta || 'Learn More';
  const bgImg = _findStoryImage(ad);
  const hasImg = !!bgImg;
  return `<div class="ig-story${hasImg ? ' ig-story-has-img' : ''}">
    ${hasImg ? `<img class="ig-story-bg" src="${bgImg}" alt="" loading="lazy">` : ''}
    <div class="ig-story-progress"><div class="ig-story-progress-fill"></div></div>
    <div class="ig-story-text">${esc(overlay)}</div>
    ${secondary ? `<div class="ig-story-secondary">${esc(secondary)}</div>` : ''}
    <div class="ig-story-cta">${esc(cta)}</div>
  </div>`;
}

function renderReelMockup(ad) {
  const r = ad.reels || {};
  const caption = r.caption || ad.primary_text || '';
  const cta = ad.cta || 'Learn More';
  const truncCaption = caption.length > 120 ? caption.slice(0, 120) + '...' : caption;
  return `<div class="ig-reel">
    <div class="fb-play-btn" style="top:40%"></div>
    <div class="ig-reel-caption">${esc(truncCaption)}</div>
    <div class="ig-reel-handle">@${esc(_data.client || '')}</div>
    <div class="ig-reel-cta">${esc(cta)}</div>
  </div>`;
}

// ── Feedback Drawer ────────────────────────────────────────────────────────
function toggleDrawer() {
  _drawerExpanded = !_drawerExpanded;
  const drawer = document.getElementById('feedback-drawer');
  const toggleText = document.getElementById('drawer-toggle-text');
  drawer.classList.toggle('expanded', _drawerExpanded);
  toggleText.textContent = _drawerExpanded ? 'Collapse' : 'Expand';
}

function renderDrawer() {
  if (!_data || !_data.ads || !_data.ads[_currentAd]) return;
  const ad = _data.ads[_currentAd];

  // Update drawer title
  document.getElementById('drawer-title').textContent =
    `Leave Feedback \u2014 Ad ${ad.num}: ${ad.title}`;

  const body = document.getElementById('drawer-body');
  let html = '';

  // Enhancement 6: Feedback thread (Mileage mode or own feedback in Client mode)
  html += `<div id="feedback-thread-container"></div>`;

  // Already submitted notice
  html += `<div class="feedback-already" id="drawer-feedback-already">
    You already submitted feedback for this ad.
    <br><button class="feedback-already-btn" onclick="enableDrawerResubmit()">Update your feedback</button>
  </div>`;

  // Feedback form
  const savedName = localStorage.getItem('adpreview_name') || '';
  const savedRole = localStorage.getItem('adpreview_role') || 'Client';

  // Restore draft
  const draftKey = `adpreview_draft_${CAMPAIGN_ID}_${ad.num}`;
  let draft = null;
  try { draft = JSON.parse(localStorage.getItem(draftKey)); } catch(e) {}

  const nameVal = draft ? (draft.name || savedName) : savedName;
  const roleVal = draft ? (draft.role || savedRole) : savedRole;
  const verdictVal = draft ? (draft.verdict || 'comment_only') : 'comment_only';
  const commentVal = draft ? (draft.comment || '') : '';

  const roleHidden = _reviewerMode === 'client' ? ' style="display:none"' : '';
  const roleOverride = _reviewerMode === 'client' ? 'Client' : roleVal;

  html += `<div id="drawer-feedback-form">
    <div class="feedback-row">
      <div>
        <div class="feedback-label">Name</div>
        <input type="text" class="feedback-input" id="drawer-fb-name" value="${esc(nameVal)}" placeholder="Your name">
      </div>
      <div${roleHidden}>
        <div class="feedback-label">Role</div>
        <select class="feedback-select" id="drawer-fb-role">
          <option value="Client"${roleOverride==='Client' ? ' selected' : ''}>Client</option>
          <option value="Mileage"${roleOverride==='Mileage' ? ' selected' : ''}>Mileage</option>
        </select>
      </div>
    </div>

    <div class="feedback-label">Verdict</div>
    <div class="feedback-verdicts">
      <label class="verdict-option">
        <input type="radio" name="drawer-verdict" value="approve"${verdictVal==='approve'?' checked':''}> Approve
      </label>
      <label class="verdict-option">
        <input type="radio" name="drawer-verdict" value="request_changes"${verdictVal==='request_changes'?' checked':''}> Request Changes
      </label>
      <label class="verdict-option">
        <input type="radio" name="drawer-verdict" value="comment_only"${verdictVal==='comment_only'?' checked':''}> Comment Only
      </label>
    </div>

    <div class="feedback-label">Feedback <span class="draft-saved-indicator" id="draft-saved">Draft saved</span></div>
    <textarea class="feedback-textarea" id="drawer-fb-comment" placeholder="Your feedback on this ad...">${esc(commentVal)}</textarea>

    <div style="margin-top:12px;display:flex;align-items:center;gap:12px">
      <button class="feedback-submit" id="drawer-fb-submit" onclick="submitDrawerFeedback()">Submit Feedback</button>
      <span id="drawer-fb-error" style="color:var(--danger);font-size:12px;display:none"></span>
    </div>
  </div>

  <div class="feedback-success" id="drawer-feedback-success">
    Your feedback has been recorded.<br>
    <span style="color:var(--text2);font-size:12px">Only the Mileage team can see all responses.</span>
  </div>`;

  body.innerHTML = html;

  // Check existing submission
  checkDrawerExistingFeedback(ad.num);

  // Load feedback thread
  loadFeedbackThread(ad.num);

  // Attach auto-save listeners
  attachDraftAutoSave(ad.num);
}

function checkDrawerExistingFeedback(adNum) {
  const submitted = JSON.parse(localStorage.getItem('adpreview_submitted') || '{}');
  if (submitted[`${CAMPAIGN_ID}-${adNum}`]) {
    const formEl = document.getElementById('drawer-feedback-form');
    const alreadyEl = document.getElementById('drawer-feedback-already');
    const successEl = document.getElementById('drawer-feedback-success');
    if (formEl) formEl.style.display = 'none';
    if (alreadyEl) alreadyEl.classList.add('visible');
    if (successEl) successEl.classList.add('visible');
  }
}

function enableDrawerResubmit() {
  const formEl = document.getElementById('drawer-feedback-form');
  const alreadyEl = document.getElementById('drawer-feedback-already');
  const successEl = document.getElementById('drawer-feedback-success');
  if (formEl) formEl.style.display = 'block';
  if (alreadyEl) alreadyEl.classList.remove('visible');
  if (successEl) successEl.classList.remove('visible');
}

async function submitDrawerFeedback() {
  if (!_data || !_data.ads[_currentAd]) return;
  const ad = _data.ads[_currentAd];
  const adNum = ad.num;

  const name = document.getElementById('drawer-fb-name').value.trim();
  const roleEl = document.getElementById('drawer-fb-role');
  const role = _reviewerMode === 'client' ? 'Client' : roleEl.value;
  const verdictEl = document.querySelector('input[name="drawer-verdict"]:checked');
  const verdict = verdictEl ? verdictEl.value : 'comment_only';
  const comment = document.getElementById('drawer-fb-comment').value.trim();
  const errorEl = document.getElementById('drawer-fb-error');
  const submitBtn = document.getElementById('drawer-fb-submit');

  if (!name) {
    errorEl.textContent = 'Please enter your name.';
    errorEl.style.display = 'inline';
    return;
  }
  errorEl.style.display = 'none';

  localStorage.setItem('adpreview_name', name);
  localStorage.setItem('adpreview_role', role);

  submitBtn.disabled = true;
  submitBtn.textContent = 'Submitting...';

  try {
    if (!sb) throw new Error('Supabase not configured');

    const { error } = await sb.from('feedback').insert({
      campaign_id: CAMPAIGN_ID,
      ad_num: adNum,
      reviewer_name: name,
      reviewer_role: role,
      verdict: verdict,
      comment: comment,
    });

    if (error) throw error;

    // Mark as submitted
    const submitted = JSON.parse(localStorage.getItem('adpreview_submitted') || '{}');
    submitted[`${CAMPAIGN_ID}-${adNum}`] = true;
    localStorage.setItem('adpreview_submitted', JSON.stringify(submitted));

    // Save verdict for tab dot + progress bar
    localStorage.setItem(`adpreview_verdict_${CAMPAIGN_ID}_${adNum}`, verdict);
    updateTabDot(adNum, verdict);
    renderProgressBar();

    // Clear draft
    localStorage.removeItem(`adpreview_draft_${CAMPAIGN_ID}_${adNum}`);

    // Show success
    document.getElementById('drawer-feedback-form').style.display = 'none';
    document.getElementById('drawer-feedback-success').classList.add('visible');

    // Reload thread
    loadFeedbackThread(adNum);

  } catch (e) {
    errorEl.textContent = `Error: ${e.message || 'Could not submit feedback.'}`;
    errorEl.style.display = 'inline';
    submitBtn.disabled = false;
    submitBtn.textContent = 'Submit Feedback';
  }
}

// ── Auto-Save Draft ────────────────────────────────────────────────────────
function attachDraftAutoSave(adNum) {
  const textarea = document.getElementById('drawer-fb-comment');
  const nameInput = document.getElementById('drawer-fb-name');
  const roleSelect = document.getElementById('drawer-fb-role');
  const verdicts = document.querySelectorAll('input[name="drawer-verdict"]');

  const saveDraft = () => {
    clearTimeout(_draftSaveTimer);
    _draftSaveTimer = setTimeout(() => {
      const verdictEl = document.querySelector('input[name="drawer-verdict"]:checked');
      const draft = {
        name: nameInput ? nameInput.value : '',
        role: roleSelect ? roleSelect.value : 'Client',
        verdict: verdictEl ? verdictEl.value : 'comment_only',
        comment: textarea ? textarea.value : '',
      };
      localStorage.setItem(`adpreview_draft_${CAMPAIGN_ID}_${adNum}`, JSON.stringify(draft));

      // Show "Draft saved" indicator
      const indicator = document.getElementById('draft-saved');
      if (indicator) {
        indicator.classList.add('visible');
        setTimeout(() => indicator.classList.remove('visible'), 1500);
      }
    }, 1000);
  };

  if (textarea) textarea.addEventListener('input', saveDraft);
  if (nameInput) nameInput.addEventListener('input', saveDraft);
  if (roleSelect) roleSelect.addEventListener('change', saveDraft);
  verdicts.forEach(v => v.addEventListener('change', saveDraft));
}

// ── Feedback Thread ────────────────────────────────────────────────────────
async function loadFeedbackThread(adNum) {
  const container = document.getElementById('feedback-thread-container');
  if (!container) return;

  // Only show in Mileage mode, or show own feedback in Client mode
  if (!sb) { container.innerHTML = ''; return; }

  try {
    let query = sb.from('feedback').select('*')
      .eq('campaign_id', CAMPAIGN_ID)
      .eq('ad_num', adNum)
      .order('created_at');

    const { data, error } = await query;
    if (error) throw error;
    if (!data || data.length === 0) { container.innerHTML = ''; return; }

    // In Client mode, only show the reviewer's own feedback
    let entries = data;
    if (_reviewerMode === 'client') {
      const myName = localStorage.getItem('adpreview_name') || '';
      entries = data.filter(f => f.reviewer_name === myName);
    }
    if (entries.length === 0) { container.innerHTML = ''; return; }

    let html = `<div class="feedback-thread">
      <div class="feedback-thread-title">Previous Feedback</div>`;

    entries.forEach(f => {
      const verdictLabel = f.verdict === 'approve' ? 'Approved' :
                           f.verdict === 'request_changes' ? 'Changes Requested' : 'Comment';
      const ts = f.created_at ? new Date(f.created_at).toLocaleString() : '';

      html += `<div class="feedback-entry">
        <div class="feedback-entry-header">
          <span class="feedback-entry-name">${esc(f.reviewer_name)}</span>
          <span class="feedback-entry-role">${esc(f.reviewer_role)}</span>
          <span class="verdict-badge ${f.verdict}">${verdictLabel}</span>
          <span class="feedback-entry-time">${esc(ts)}</span>
        </div>
        ${f.comment ? `<div class="feedback-entry-comment">${esc(f.comment)}</div>` : ''}
      </div>`;
    });

    html += `</div>`;
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '';
  }
}

// ── Keyboard Navigation ────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  // Skip if user is typing in an input or textarea
  const tag = e.target.tagName.toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable) return;

  if (!_data || !_data.ads) return;

  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (_currentAd > 0) selectTab(_currentAd - 1);
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (_currentAd < _data.ads.length - 1) selectTab(_currentAd + 1);
  } else if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    if (idx < _data.ads.length) selectTab(idx);
  } else if (e.key === 'f' || e.key === 'F') {
    e.preventDefault();
    toggleDrawer();
  }
});

// ── Utility ────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Init ───────────────────────────────────────────────────────────────────
init();
</script>
