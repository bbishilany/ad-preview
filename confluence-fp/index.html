// ── Carousel Navigation ────────────────────────────────────────────────────
function scrollCarousel(btn, direction) {
  // Prevent pin drop when clicking carousel arrows
  event.stopPropagation();
  const wrap = btn.closest('.fb-carousel-wrap');
  const track = wrap.querySelector('[data-carousel-track]');
  if (!track) return;
  const cardWidth = 260;
  track.scrollBy({ left: direction * cardWidth, behavior: 'smooth' });
}

function initCarouselNav() {
  const tracks = document.querySelectorAll('[data-carousel-track]');
  tracks.forEach(track => {
    track.addEventListener('scroll', () => {
      const dotsContainer = track.closest('.fb-feed').querySelector('[data-carousel-dots]');
      if (!dotsContainer) return;
      const dots = dotsContainer.querySelectorAll('.carousel-dot');
      const cardWidth = 260;
      const activeIdx = Math.round(track.scrollLeft / cardWidth);
      dots.forEach((dot, i) => dot.classList.toggle('active', i === activeIdx));
    });
  });
}

// ── MOCKUP ZOOM (Feature 1) ───────────────────────────────────────────────
let _zoomOriginalElement = null;
let _zoomActive = false;

function openMockupZoom(element) {
  const overlay = document.getElementById('mockup-zoom-overlay');
  const content = document.getElementById('mockup-zoom-content');
  if (!overlay || !content) return;

  const clone = element.cloneNode(true);
  content.innerHTML = '';
  content.appendChild(clone);

  _zoomOriginalElement = element;
  _zoomActive = true;

  // Sync pin mode button state in zoom overlay
  updateZoomPinButton();

  // Load existing pins onto the zoomed clone
  if (_data && _data.ads[_currentAd]) {
    const adNum = _data.ads[_currentAd].num;
    const pins = _pinsCache[adNum] || [];
    const targetSelector = clone.getAttribute('data-pin-target');
    pins.forEach(p => {
      if (p.target_selector === targetSelector) {
        const m = document.createElement('div');
        m.className = 'pin-marker existing';
        m.style.left = p.pin_x + '%';
        m.style.top = p.pin_y + '%';
        m.textContent = p.pin_number || '';
        m.addEventListener('click', function(ev) {
          ev.stopPropagation();
          showPinTooltip(clone, m, p, _data.ads[_currentAd].num);
        });
        clone.appendChild(m);
      }
    });
  }

  // Pin click handler on the zoomed clone
  clone.addEventListener('click', function(e) {
    if (!_pinModeActive) return;
    if (e.target.closest('.pin-marker') || e.target.closest('.pin-popup') ||
        e.target.closest('.pin-tooltip') || e.target.closest('.carousel-nav-arrow') ||
        e.target.closest('.fb-engage-icon') || e.target.closest('.fb-header-menu')) return;

    e.preventDefault();
    e.stopPropagation();
    closeActivePinPopup();

    const adNum = _data.ads[_currentAd].num;
    const rect = clone.getBoundingClientRect();
    const pinX = ((e.clientX - rect.left) / rect.width * 100);
    const pinY = ((e.clientY - rect.top) / rect.height * 100);
    const targetSelector = clone.getAttribute('data-pin-target');
    const targetType = 'mockup';
    const existingPins = _pinsCache[adNum] || [];
    const pinNumber = existingPins.length + 1;

    const marker = document.createElement('div');
    marker.className = 'pin-marker new-pin';
    marker.style.left = pinX + '%';
    marker.style.top = pinY + '%';
    marker.textContent = pinNumber;
    clone.appendChild(marker);

    showPinCreationPopup(clone, marker, pinX, pinY, pinNumber, adNum, targetType, targetSelector);
  });

  // Set cursor based on pin mode
  if (_pinModeActive) clone.style.cursor = SCOPE_CURSOR;

  overlay.classList.add('active');
  overlay.scrollTop = 0;
}

function closeMockupZoom() {
  const overlay = document.getElementById('mockup-zoom-overlay');
  if (!overlay) return;
  overlay.classList.remove('active');
  _zoomActive = false;
  closeActivePinPopup();

  if (_zoomOriginalElement && _data && _data.ads[_currentAd]) {
    renderAd(_currentAd);
  }
  _zoomOriginalElement = null;

  setTimeout(() => {
    const content = document.getElementById('mockup-zoom-content');
    if (content) content.innerHTML = '';
  }, 250);
}

function handleZoomOverlayClick(e) {
  // Close zoom if clicking the dark backdrop (not the content or controls)
  if (e.target.id === 'mockup-zoom-overlay') {
    closeMockupZoom();
  }
}

function togglePinModeFromZoom(e) {
  e.stopPropagation();
  togglePinMode();
  updateZoomPinButton();
  // Update cursor on zoomed clone
  const content = document.getElementById('mockup-zoom-content');
  if (content) {
    const clone = content.firstElementChild;
    if (clone) clone.style.cursor = _pinModeActive ? SCOPE_CURSOR : 'zoom-out';
  }
}

function updateZoomPinButton() {
  const btn = document.getElementById('zoom-pin-btn');
  if (!btn) return;
  btn.classList.toggle('active', _pinModeActive);
  btn.querySelector('span').textContent = _pinModeActive ? 'Comment Pin ON' : 'Comment Pin';
}

// ── PIN DROP SYSTEM ────────────────────────────────────────────────────────
function togglePinMode() {
  _pinModeActive = !_pinModeActive;
  document.body.classList.toggle('pin-mode-active', _pinModeActive);
  const btn = document.getElementById('pin-mode-btn');
  if (btn) {
    btn.classList.toggle('active', _pinModeActive);
    const span = btn.querySelector('span:not(.pin-mode-hint)');
    if (span) span.textContent = _pinModeActive ? 'Comment Pin ON' : 'Comment Pin';
  }
  closeActivePinPopup();
}

function closeActivePinPopup() {
  if (_activePinPopup) {
    _activePinPopup.remove();
    _activePinPopup = null;
  }
}

function attachPinClickHandlers(adNum) {
  // Pinnable targets: mockup containers + copy sections
  const targets = document.querySelectorAll('[data-pin-target]');
  targets.forEach(target => {
    target.addEventListener('click', function(e) {
      // Do not interact with existing pins, popups, or interactive elements
      if (e.target.closest('.pin-marker') || e.target.closest('.pin-popup') ||
          e.target.closest('.pin-tooltip') || e.target.closest('.carousel-nav-arrow') ||
          e.target.closest('.fb-engage-icon') || e.target.closest('.fb-header-menu')) return;

      const targetSelector = target.getAttribute('data-pin-target');
      const isMockup = targetSelector.startsWith('mockup-');

      // Feature 1: If NOT in pin mode and it's a mockup, zoom in
      if (!_pinModeActive && isMockup) {
        e.preventDefault();
        e.stopPropagation();
        openMockupZoom(target);
        return;
      }

      if (!_pinModeActive) return;

      e.preventDefault();
      e.stopPropagation();
      closeActivePinPopup();

      const rect = target.getBoundingClientRect();
      const pinX = ((e.clientX - rect.left) / rect.width * 100);
      const pinY = ((e.clientY - rect.top) / rect.height * 100);
      const targetType = isMockup ? 'mockup' : 'copy';

      // Determine next pin number
      const existingPins = _pinsCache[adNum] || [];
      const pinNumber = existingPins.length + 1;

      // Create the pin marker
      const marker = document.createElement('div');
      marker.className = 'pin-marker new-pin';
      marker.style.left = pinX + '%';
      marker.style.top = pinY + '%';
      marker.textContent = pinNumber;
      target.appendChild(marker);

      // Create the popup
      showPinCreationPopup(target, marker, pinX, pinY, pinNumber, adNum, targetType, targetSelector);
    });
  });
}

function showPinCreationPopup(container, marker, pinX, pinY, pinNumber, adNum, targetType, targetSelector) {
  const popup = document.createElement('div');
  popup.className = 'pin-popup';

  // Position popup adjacent to pin. Offset so it doesn't cover the pin.
  let popupLeft = pinX;
  let popupTop = pinY;
  // If pin is on the right half, put popup to the left
  if (pinX > 60) {
    popup.style.right = (100 - pinX + 2) + '%';
  } else {
    popup.style.left = (pinX + 2) + '%';
  }
  popup.style.top = pinY + '%';

  const savedName = localStorage.getItem('adpreview_name') || '';

  popup.innerHTML = `
    <div style="font-size:11px;font-weight:600;color:var(--accent);margin-bottom:6px">Pin #${pinNumber}</div>
    <textarea placeholder="Leave your comment here..." autofocus></textarea>
    <div class="pin-popup-actions">
      <button class="pin-popup-cancel" data-pin-cancel>Cancel</button>
      <button class="pin-popup-save" data-pin-save>Save</button>
    </div>
  `;

  container.appendChild(popup);
  _activePinPopup = popup;

  // Focus the textarea
  const textarea = popup.querySelector('textarea');
  setTimeout(() => textarea.focus(), 50);

  // Cancel
  popup.querySelector('[data-pin-cancel]').addEventListener('click', function(e) {
    e.stopPropagation();
    marker.remove();
    popup.remove();
    _activePinPopup = null;
  });

  // Save
  popup.querySelector('[data-pin-save]').addEventListener('click', function(e) {
    e.stopPropagation();
    const comment = textarea.value.trim();
    if (!comment) {
      textarea.style.borderColor = 'var(--danger)';
      return;
    }

    const reviewerName = localStorage.getItem('adpreview_name') || 'Anonymous';

    const pinData = {
      campaign_id: CAMPAIGN_ID,
      ad_num: adNum,
      pin_x: pinX,
      pin_y: pinY,
      target_type: targetType,
      target_selector: targetSelector,
      reviewer_name: reviewerName,
      comment: comment,
      created_at: new Date().toISOString(),
      pin_number: pinNumber,
    };

    // Save pin
    savePinData(pinData);

    // Update cache
    if (!_pinsCache[adNum]) _pinsCache[adNum] = [];
    _pinsCache[adNum].push(pinData);

    // Convert marker to existing style
    marker.className = 'pin-marker existing';
    marker.addEventListener('click', function(ev) {
      ev.stopPropagation();
      showPinTooltip(container, marker, pinData);
    });

    popup.remove();
    _activePinPopup = null;
  });
}

function showPinTooltip(container, marker, pinData) {
  closeActivePinPopup();

  const tooltip = document.createElement('div');
  tooltip.className = 'pin-tooltip';

  const pinX = parseFloat(marker.style.left);
  if (pinX > 60) {
    tooltip.style.right = (100 - pinX + 2) + '%';
  } else {
    tooltip.style.left = (pinX + 2) + '%';
  }
  tooltip.style.top = marker.style.top;

  // Feature 3: Action buttons for pins
  const myName = localStorage.getItem('adpreview_name') || '';
  const isMileage = _reviewerMode === 'mileage';
  const isOwn = pinData.reviewer_name === myName && myName !== '';

  const pinItemId = 'pin-' + (pinData.id || pinData.created_at);
  const pinIsResolved = isResolved(pinItemId);
  let actionsHtml = '';
  if (isMileage || isOwn) {
    actionsHtml = '<div class="pin-tooltip-actions">';
    if (isOwn) actionsHtml += `<button class="feedback-action-btn" data-pin-edit>Edit</button>`;
    if (isMileage) actionsHtml += `<button class="feedback-action-btn delete-btn" data-pin-delete>Delete</button>`;
    if (isMileage) actionsHtml += `<button class="mark-complete-btn${pinIsResolved ? ' resolved' : ''}" data-pin-resolve="${pinItemId}">${pinIsResolved ? '&#10003; Done' : 'Mark Complete'}</button>`;
    actionsHtml += '</div>';
  }

  tooltip.innerHTML = `
    <div class="pin-tooltip-header">
      <span class="pin-tooltip-name">${esc(pinData.reviewer_name)}</span>
      <span>${new Date(pinData.created_at).toLocaleString()}</span>
      <span class="pin-tooltip-close" data-tooltip-close>&times;</span>
    </div>
    <div class="pin-tooltip-comment">${esc(pinData.comment)}</div>
    ${actionsHtml}
  `;

  container.appendChild(tooltip);
  _activePinPopup = tooltip;

  tooltip.querySelector('[data-tooltip-close]').addEventListener('click', function(e) {
    e.stopPropagation();
    tooltip.remove();
    _activePinPopup = null;
  });

  // Delete pin
  const deleteBtn = tooltip.querySelector('[data-pin-delete]');
  if (deleteBtn) {
    deleteBtn.addEventListener('click', async function(e) {
      e.stopPropagation();
      if (!confirm('Are you sure you want to delete this pin?')) return;
      // Pins are localStorage-only (no Supabase table)
      // Remove from localStorage
      const adNum = pinData.ad_num;
      const lsKey = `adpreview_pins_${CAMPAIGN_ID}_${adNum}`;
      try {
        let localPins = JSON.parse(localStorage.getItem(lsKey)) || [];
        localPins = localPins.filter(p => p.created_at !== pinData.created_at || p.comment !== pinData.comment);
        localStorage.setItem(lsKey, JSON.stringify(localPins));
      } catch(err) {}
      // Remove from cache
      if (_pinsCache[adNum]) {
        _pinsCache[adNum] = _pinsCache[adNum].filter(p => p !== pinData);
      }
      marker.remove();
      tooltip.remove();
      _activePinPopup = null;
      updateTabBadges();
    });
  }

  // Mark complete handler for pin
  const resolveBtn = tooltip.querySelector('[data-pin-resolve]');
  if (resolveBtn) {
    resolveBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      const itemId = this.getAttribute('data-pin-resolve');
      toggleResolved(itemId);
      // Update button state
      const isNowResolved = isResolved(itemId);
      this.classList.toggle('resolved', isNowResolved);
      this.innerHTML = isNowResolved ? '&#10003; Done' : 'Mark Complete';
    });
  }

  // Edit pin
  const editBtn = tooltip.querySelector('[data-pin-edit]');
  if (editBtn) {
    editBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      const commentDiv = tooltip.querySelector('.pin-tooltip-comment');
      const actionsDiv = tooltip.querySelector('.pin-tooltip-actions');
      const oldComment = pinData.comment;

      commentDiv.innerHTML = `<div class="feedback-edit-area">
        <textarea>${esc(oldComment)}</textarea>
        <div class="feedback-edit-actions">
          <button class="feedback-edit-cancel" data-edit-cancel>Cancel</button>
          <button class="feedback-edit-save" data-edit-save>Save</button>
        </div>
      </div>`;
      if (actionsDiv) actionsDiv.style.display = 'none';

      const textarea = commentDiv.querySelector('textarea');
      textarea.focus();

      commentDiv.querySelector('[data-edit-cancel]').addEventListener('click', function(ev) {
        ev.stopPropagation();
        commentDiv.innerHTML = esc(oldComment);
        if (actionsDiv) actionsDiv.style.display = '';
      });

      commentDiv.querySelector('[data-edit-save]').addEventListener('click', async function(ev) {
        ev.stopPropagation();
        const newComment = textarea.value.trim();
        if (!newComment) return;

        // Pins are localStorage-only (no Supabase table)
        // Update localStorage
        const adNum = pinData.ad_num;
        const lsKey = `adpreview_pins_${CAMPAIGN_ID}_${adNum}`;
        try {
          let localPins = JSON.parse(localStorage.getItem(lsKey)) || [];
          const idx = localPins.findIndex(p => p.created_at === pinData.created_at && p.comment === oldComment);
          if (idx >= 0) { localPins[idx].comment = newComment; localStorage.setItem(lsKey, JSON.stringify(localPins)); }
        } catch(err) {}
        pinData.comment = newComment;
        commentDiv.innerHTML = esc(newComment);
        if (actionsDiv) actionsDiv.style.display = '';
      });
    });
  }
}

async function savePinData(pinData) {
  // Save to localStorage as fallback (always)
  const lsKey = `adpreview_pins_${CAMPAIGN_ID}_${pinData.ad_num}`;
  let localPins = [];
  try { localPins = JSON.parse(localStorage.getItem(lsKey)) || []; } catch(e) {}
  localPins.push(pinData);
  localStorage.setItem(lsKey, JSON.stringify(localPins));

  // Pins are localStorage-only (no Supabase table)
  updateTabBadges();
}

async function loadAndRenderPins(adNum) {
  let pins = [];

  // Load pins from localStorage
  {
    const lsKey = `adpreview_pins_${CAMPAIGN_ID}_${adNum}`;
    try {
      const localPins = JSON.parse(localStorage.getItem(lsKey)) || [];
      pins = localPins.map((p, i) => ({ ...p, pin_number: i + 1 }));
    } catch(e) {}
  }

  // Cache
  _pinsCache[adNum] = pins;

  // Render each pin
  pins.forEach(pin => {
    const container = document.querySelector(`[data-pin-target="${pin.target_selector}"]`);
    if (!container) return;

    const marker = document.createElement('div');
    marker.className = 'pin-marker existing';
    marker.style.left = pin.pin_x + '%';
    marker.style.top = pin.pin_y + '%';
    marker.textContent = pin.pin_number;
    container.appendChild(marker);

    marker.addEventListener('click', function(ev) {
      ev.stopPropagation();
      showPinTooltip(container, marker, pin);
    });
  });
}

// ── Ad Status (inline verdict) ────────────────────────────────────────────
function setAdStatus(adNum, verdict, btnEl) {
  // Save locally
  localStorage.setItem(`adpreview_verdict_${CAMPAIGN_ID}_${adNum}`, verdict);

  // Update button styles
  const bar = document.getElementById('ad-status-bar');
  if (bar) {
    bar.querySelectorAll('.ad-status-btn').forEach(b => {
      b.className = 'ad-status-btn';
    });
    if (verdict === 'approve') btnEl.classList.add('selected-approve');
    else if (verdict === 'request_changes') btnEl.classList.add('selected-changes');
    else btnEl.classList.add('selected-comment');
  }

  // Flash "Saved"
  const saved = document.getElementById('ad-status-saved');
  if (saved) {
    saved.classList.add('visible');
    setTimeout(() => saved.classList.remove('visible'), 1500);
  }

  // Sync with the feedback form verdict radios
  const radio = document.querySelector(`input[name="drawer-verdict"][value="${verdict}"]`);
  if (radio) radio.checked = true;

  // Update tab dot and progress bar
  updateTabDot(adNum, verdict);
  renderProgressBar();
}

// ── Approve Ad ───────────────────────────────────────────────────────────
function getApprovalSummary() {
  if (!_data || !_data.ads) return '';
  const total = _data.ads.length;
  const approved = _data.ads.filter(ad =>
    localStorage.getItem(`adpreview_verdict_${CAMPAIGN_ID}_${ad.num}`) === 'approve'
  ).length;
  const remaining = total - approved;

  if (approved === 0) return `${total} ads to review`;
  if (remaining === 0) return `<strong>All ${total} ads approved!</strong>`;

  const pendingAds = _data.ads
    .filter(ad => localStorage.getItem(`adpreview_verdict_${CAMPAIGN_ID}_${ad.num}`) !== 'approve')
    .map(ad => `Ad ${ad.num}`)
    .join(', ');
  return `<strong>${approved} of ${total}</strong> approved — still need: ${pendingAds}`;
}

function ensureReviewerName() {
  const saved = localStorage.getItem('adpreview_name') || '';
  if (saved.trim()) return saved.trim();

  const name = prompt('Please enter your name to continue:');
  if (!name || !name.trim()) return null;
  localStorage.setItem('adpreview_name', name.trim());
  return name.trim();
}

async function approveAd(adNum, btnEl) {
  if (btnEl.classList.contains('approved')) return;

  const reviewerName = localStorage.getItem('adpreview_name') || 'Anonymous';

  // Save approval locally
  localStorage.setItem(`adpreview_verdict_${CAMPAIGN_ID}_${adNum}`, 'approve');

  // Update button state
  btnEl.classList.add('approved');
  btnEl.disabled = true;
  btnEl.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Approved`;

  // Update progress bar and tab badges
  renderProgressBar();
  updateTabBadges();

  // Update the status summary next to the button
  const statusMsg = document.getElementById('approve-status-msg');
  if (statusMsg) statusMsg.innerHTML = getApprovalSummary();

  // Notify via Supabase (reviewerName already set above from ensureReviewerName)
  if (sb) {
    try {
      await sb.from('feedback').insert({
        campaign_id: CAMPAIGN_ID,
        ad_num: adNum,
        reviewer_name: reviewerName,
        reviewer_role: 'Client',
        verdict: 'approve',
        comment: `Ad ${adNum} approved`,
      });
    } catch(e) { console.warn('Approval notification failed:', e); }
  }

  // Check if all approved — show celebration
  const total = _data.ads.length;
  const approved = _data.ads.filter(ad =>
    localStorage.getItem(`adpreview_verdict_${CAMPAIGN_ID}_${ad.num}`) === 'approve'
  ).length;

  if (approved === total) {
    showUploadToast('All ads approved! The Mileage team has been notified.', 'success');
  } else {
    showUploadToast(`Ad ${adNum} approved — ${total - approved} remaining`, 'success');
  }
}

// ── Legacy drawer removed — feedback is inline now ───────────────────────

// ── Keyboard Navigation ────────────────────────────────────────────────────
document.addEventListener('keydown', function(e) {
  // Feature 1: Escape closes zoom overlay (works even from inputs)
  if (e.key === 'Escape') {
    const overlay = document.getElementById('mockup-zoom-overlay');
    if (overlay && overlay.classList.contains('active')) {
      e.preventDefault();
      closeMockupZoom();
      return;
    }
  }

  // Skip if user is typing in an input or textarea
  const tag = e.target.tagName.toLowerCase();
  if (tag === 'input' || tag === 'textarea' || tag === 'select' || e.target.isContentEditable) return;

  if (!_data || !_data.ads) return;

  if (e.key === 'ArrowLeft') {
    e.preventDefault();
    if (_currentAd > 0) selectTab(_currentAd - 1);
  } else if (e.key === 'ArrowRight') {
    e.preventDefault();
    if (_currentAd < _data.ads.length - 1) selectTab(_currentAd + 1);
  } else if (e.key >= '1' && e.key <= '9') {
    const idx = parseInt(e.key) - 1;
    if (idx < _data.ads.length) selectTab(idx);
  } else if (e.key === 'p' || e.key === 'P') {
    e.preventDefault();
    togglePinMode();
  }
});

// Close pin popups/tooltips when clicking outside
document.addEventListener('click', function(e) {
  if (_activePinPopup && !e.target.closest('.pin-popup') &&
      !e.target.closest('.pin-tooltip') && !e.target.closest('.pin-marker')) {
    closeActivePinPopup();
  }
});

// Feature 1: Close zoom overlay when clicking the overlay background (not the content)
document.addEventListener('click', function(e) {
  const overlay = document.getElementById('mockup-zoom-overlay');
  if (overlay && overlay.classList.contains('active') && e.target === overlay) {
    closeMockupZoom();
  }
});

// ── Utility ────────────────────────────────────────────────────────────────
function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Feature 4: Reviewer Identity ──────────────────────────────────────────
function initReviewerIdentity() {
  const savedName = localStorage.getItem('adpreview_name') || '';
  const identity = document.getElementById('reviewer-identity');
  const identityName = document.getElementById('reviewer-identity-name');

  if (savedName) {
    if (identity) identity.style.display = 'flex';
    if (identityName) identityName.textContent = savedName;
  } else {
    if (identity) identity.style.display = 'none';
  }
}

function showEditNamePrompt() {
  const currentName = localStorage.getItem('adpreview_name') || '';
  const newName = prompt('Change your reviewer name:', currentName);
  if (newName !== null && newName.trim()) {
    localStorage.setItem('adpreview_name', newName.trim());
    initReviewerIdentity();
  }
}

// ── Init ───────────────────────────────────────────────────────────────────
function toggleTheme() {
  const isLight = document.body.classList.toggle('light-mode');
  localStorage.setItem('adpreview_theme', isLight ? 'light' : 'dark');
  document.getElementById('theme-toggle').innerHTML = isLight ? '&#9728;' : '&#9790;';
}

function initTheme() {
  const saved = localStorage.getItem('adpreview_theme');
  if (saved === 'light') {
    document.body.classList.add('light-mode');
    document.getElementById('theme-toggle').innerHTML = '&#9728;';
  }
}

function fullInit() {
  _reviewerMode = localStorage.getItem('adpreview_reviewer_mode') || 'internal';
  initTheme();
  initReviewerIdentity();
  // Ask for name once at session start if not already saved
  if (!localStorage.getItem('adpreview_name')) {
    const name = prompt('Welcome! Please enter your name to get started:');
    if (name && name.trim()) {
      localStorage.setItem('adpreview_name', name.trim());
    }
  }
  init();
}
fullInit();
